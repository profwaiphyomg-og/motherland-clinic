<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motherland Clinic - Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1a1a2e;
      --secondary: #c9a962;
      --accent: #e8d5b7;
      --bg: #0f0f1a;
      --surface: #252538;
      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #ef4444;
      --text: #f5f5f5;
      --text-muted: #a0a0b0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(201, 169, 98, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(201, 169, 98, 0.05) 0%, transparent 50%);
    }

    .header {
      background: var(--surface);
      padding: 20px 32px;
      border-bottom: 1px solid rgba(201, 169, 98, 0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--secondary);
    }

    .logo span {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary {
      background: rgba(201, 169, 98, 0.15);
      color: var(--secondary);
      border: 1px solid rgba(201, 169, 98, 0.3);
    }

    .btn-secondary:hover {
      background: rgba(201, 169, 98, 0.25);
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
      padding: 24px 32px;
      max-width: 1600px;
      margin: 0 auto;
    }

    @media (max-width: 1024px) {
      .main {
        grid-template-columns: 1fr;
      }
    }

    .patients-section {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid rgba(201, 169, 98, 0.15);
      overflow: hidden;
    }

    .section-header {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(201, 169, 98, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--accent);
    }

    .patient-count {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .patients-list {
      max-height: 600px;
      overflow-y: auto;
    }

    .patient-item {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.15s;
    }

    .patient-item:hover {
      background: rgba(201, 169, 98, 0.03);
    }

    .patient-item.current {
      background: rgba(201, 169, 98, 0.1);
      border-left: 3px solid var(--secondary);
    }

    .ticket-badge {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--secondary);
      min-width: 70px;
    }

    .patient-info {
      flex: 1;
      margin-left: 16px;
    }

    .patient-name {
      font-weight: 500;
      margin-bottom: 4px;
    }

    .patient-details {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .status-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-badge.waiting {
      background: rgba(251, 191, 36, 0.15);
      color: var(--warning);
    }

    .status-badge.in-consultation {
      background: rgba(74, 222, 128, 0.15);
      color: var(--success);
    }

    .status-badge.completed {
      background: rgba(160, 160, 176, 0.15);
      color: var(--text-muted);
    }

    .controls-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .control-card {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid rgba(201, 169, 98, 0.15);
      padding: 24px;
    }

    .control-title {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }

    .btn-next {
      width: 100%;
      padding: 20px;
      background: linear-gradient(135deg, var(--success) 0%, #22c55e 100%);
      border: none;
      border-radius: 12px;
      color: var(--primary);
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .btn-next:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(74, 222, 128, 0.3);
    }

    .btn-next:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-delay {
      width: 100%;
      padding: 14px;
      background: rgba(251, 191, 36, 0.15);
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 10px;
      color: var(--warning);
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-delay:hover {
      background: rgba(251, 191, 36, 0.25);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-item {
      text-align: center;
      padding: 16px 8px;
      background: rgba(201, 169, 98, 0.08);
      border-radius: 10px;
    }

    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--secondary);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .current-patient {
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .current-patient-label {
      font-size: 0.75rem;
      color: var(--success);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .current-patient-name {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .current-patient-ticket {
      font-family: 'Space Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: var(--success);
    }

    .next-patient {
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
    }

    .next-patient-label {
      font-size: 0.75rem;
      color: var(--warning);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .next-patient-name {
      font-weight: 500;
      color: var(--accent);
    }

    .back-link {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .back-link a {
      color: var(--secondary);
      text-decoration: none;
    }

    .btn-cancel-small {
      margin-left: 12px;
      width: 28px;
      height: 28px;
      padding: 0;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 6px;
      color: #ef4444;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-cancel-small:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    .btn-reset {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
      margin-top: 16px;
    }

    .btn-reset:hover {
      background: rgba(239, 68, 68, 0.25);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">
      <h1>Motherland Clinic</h1>
      <span>Admin Dashboard</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="refreshData()">↻ Refresh</button>
      <a href="/display" target="_blank" class="btn btn-secondary">📺 Display</a>
    </div>
  </header>

  <main class="main">
    <section class="patients-section">
      <div class="section-header">
        <h2 class="section-title">Patient Queue</h2>
        <span class="patient-count" id="patientCount">0 patients</span>
      </div>
      <div class="patients-list" id="patientsList">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <p>No patients in queue</p>
        </div>
      </div>
    </section>

    <aside class="controls-section">
      <div class="control-card">
        <div class="control-title">Current Status</div>

        <div class="current-patient" id="currentPatient">
          <div class="current-patient-label">Now In Consultation</div>
          <div class="current-patient-name" id="currentName">--</div>
          <div class="current-patient-ticket" id="currentTicket">--</div>
        </div>

        <div class="next-patient" id="nextPatient">
          <div class="next-patient-label">Up Next</div>
          <div class="next-patient-name" id="nextName">No one waiting</div>
        </div>

        <button class="btn-next" id="nextBtn" onclick="nextPatient()">
          ▶ Next Patient
        </button>

        <button class="btn-delay" onclick="addDelay()">
          ⏱ Add 5 Min Delay
        </button>

        <button class="btn btn-reset" onclick="resetQueue()">
          🗑 Reset Queue (Day End)
        </button>
      </div>

      <div class="control-card">
        <div class="control-title">Today's Statistics</div>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="statCompleted">0</div>
            <div class="stat-label">Completed</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="statWaiting">0</div>
            <div class="stat-label">Waiting</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="statCurrent">0</div>
            <div class="stat-label">Current</div>
          </div>
        </div>
      </div>
    </aside>
  </main>

  <div class="back-link">
    <a href="/">← Back to Patient View</a>
  </div>

  <script>
    let patients = [];

    async function fetchPatients() {
      try {
        const res = await fetch('/api/admin/patients');
        patients = await res.json();
        renderPatients();
        updateStats();
      } catch (e) {
        console.error('Failed to fetch patients:', e);
      }
    }

    function renderPatients() {
      const list = document.getElementById('patientsList');
      const count = document.getElementById('patientCount');

      count.textContent = `${patients.length} patient${patients.length !== 1 ? 's' : ''}`;

      if (patients.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <p>No patients in queue</p>
          </div>
        `;
        return;
      }

      list.innerHTML = patients.map(p => `
        <div class="patient-item ${p.status === 'in-consultation' ? 'current' : ''}">
          <div class="ticket-badge">${p.ticketNumber}</div>
          <div class="patient-info">
            <div class="patient-name">${p.name}</div>
            <div class="patient-details">${p.phone} ${p.telegramUsername ? '· @' + p.telegramUsername : ''}</div>
          </div>
          <span class="status-badge ${p.status}">${p.status.replace('-', ' ')}</span>
          ${p.status !== 'completed' ? `<button class="btn-cancel-small" onclick="removePatient('${p.id}')" title="Remove patient">✕</button>` : ''}
        </div>
      `).join('');
    }

    function updateStats() {
      const completed = patients.filter(p => p.status === 'completed').length;
      const waiting = patients.filter(p => p.status === 'waiting').length;
      const current = patients.filter(p => p.status === 'in-consultation').length;

      document.getElementById('statCompleted').textContent = completed;
      document.getElementById('statWaiting').textContent = waiting;
      document.getElementById('statCurrent').textContent = current;

      // Update current patient display
      const inConsult = patients.find(p => p.status === 'in-consultation');
      const nextInQueue = patients.find(p => p.status === 'waiting');

      if (inConsult) {
        document.getElementById('currentName').textContent = inConsult.name;
        document.getElementById('currentTicket').textContent = inConsult.ticketNumber;
      } else {
        document.getElementById('currentName').textContent = '--';
        document.getElementById('currentTicket').textContent = '--';
      }

      if (nextInQueue) {
        document.getElementById('nextName').textContent = `${nextInQueue.ticketNumber} - ${nextInQueue.name}`;
      } else {
        document.getElementById('nextName').textContent = 'No one waiting';
      }

      // Update button state
      const nextBtn = document.getElementById('nextBtn');
      nextBtn.disabled = !nextInQueue && !inConsult;

      if (!inConsult && !nextInQueue) {
        nextBtn.textContent = '✓ Queue Empty';
      } else if (!nextInQueue) {
        nextBtn.textContent = '✓ Complete Current';
      } else {
        nextBtn.textContent = '▶ Next Patient';
      }
    }

    async function nextPatient() {
      const btn = document.getElementById('nextBtn');
      btn.disabled = true;
      btn.textContent = 'Processing...';

      try {
        const res = await fetch('/api/admin/next', { method: 'POST' });
        const result = await res.json();

        // Show notification
        if (result.success) {
          // The API handles notification internally
          console.log('Queue advanced');
        }

        await fetchPatients();
      } catch (e) {
        console.error('Failed to advance queue:', e);
        alert('Failed to advance queue');
        btn.disabled = false;
        btn.textContent = '▶ Next Patient';
      }
    }

    async function addDelay() {
      try {
        await fetch('/api/admin/delay', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ minutes: 5 })
        });
        alert('5 minutes added to estimates');
      } catch (e) {
        console.error('Failed to add delay:', e);
      }
    }

    async function resetQueue() {
      if (!confirm('Are you sure you want to reset the queue? This will clear all patients for today.')) {
        return;
      }

      try {
        await fetch('/api/admin/reset', { method: 'POST' });
        await fetchPatients();
        alert('Queue has been reset');
      } catch (e) {
        console.error('Failed to reset queue:', e);
      }
    }

    function refreshData() {
      fetchPatients();
    }

    async function removePatient(id) {
      if (!confirm('Remove this patient from the queue?')) return;

      try {
        await fetch(`/api/patient/${id}`, { method: 'DELETE' });
        await fetchPatients();
      } catch (e) {
        console.error('Failed to remove patient:', e);
        alert('Failed to remove patient');
      }
    }

    // Auto-refresh every 5 seconds
    setInterval(fetchPatients, 5000);

    // Initialize
    fetchPatients();
  </script>
</body>
</html>
